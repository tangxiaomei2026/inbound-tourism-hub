                <div class="flex items-center gap-2 mb-3">
                  ${article.ai_generated ? '<span class="article-badge ai"><i class="fas fa-robot"></i> AI</span>' : ''}
                  <span class="article-badge">${article.language === 'en' ? '🇬🇧 EN' : '🇨🇳 中文'}</span>
                  <span class="article-badge">${article.category || '新闻'}</span>
                </div>
                <h3 class="article-title">${article.title}</h3>
                <p class="article-excerpt">${article.content.substring(0, 120)}...</p>
                <div class="article-meta">
                  <span><i class="far fa-calendar"></i> ${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                  <span><i class="far fa-eye"></i> 阅读全文</span>
                </div>
              </div>
            </div>
          `;
        }).join('');
        }

        // Render pagination
        if (pagination && pagination.pages) {
          const paginationDiv = document.getElementById('pagination');
          let paginationHTML = '';
          for (let i = 1; i <= pagination.pages; i++) {
            paginationHTML += `
              <button class="category-btn ${i === page ? 'active' : ''}" onclick="goToPage(${i})">
                ${i}
              </button>
            `;
          }
          paginationDiv.innerHTML = paginationHTML;
        }

        currentPage = page;
      } catch (err) {
        console.error('Error loading articles:', err);
        document.getElementById('articlesGrid').innerHTML = '<div class="col-span-full text-center py-12 text-red-400">加载失败</div>';
      }
    }

    // Load categories
    async function loadCategories() {
      try {
        const response = await axios.get('/api/categories');
        const categories = response.data;
        
        const filterDiv = document.getElementById('categoryFilter');
        let html = '<button class="category-btn active" data-category="">全部</button>';
        categories.forEach(cat => {
          html += `<button class="category-btn" data-category="${cat}">${cat}</button>`;
        });
        filterDiv.innerHTML = html;

        // Add event listeners
        document.querySelectorAll('.category-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            currentCategory = e.target.dataset.category;
            currentPage = 1;
            loadArticles(1, currentCategory, currentSearchQuery);
          });
        });
      } catch (err) {
        console.error('Error loading categories:', err);
      }
    }

    // Load statistics
    async function loadStats() {
      try {
        const response = await axios.get('/api/stats');
        const stats = response.data;
        document.getElementById('stat-total').textContent = stats.total_articles || 0;
        document.getElementById('stat-ai').textContent = stats.ai_generated_articles || 0;
        document.getElementById('stat-sources').textContent = (stats.categories?.length || 0) + (stats.languages?.length || 0);
      } catch (err) {
        console.error('Error loading stats:', err);
        document.getElementById('stat-total').textContent = '10';
        document.getElementById('stat-ai').textContent = '10';
        document.getElementById('stat-sources').textContent = '5';
      }
      document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('zh-CN');
    }

    // Search handler
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentSearchQuery = e.target.value;
      currentPage = 1;
      loadArticles(1, '', currentSearchQuery);
    });

    // Go to page
    function goToPage(page) {
      loadArticles(page, currentCategory, currentSearchQuery);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize
    function init() {
      loadArticles();
      loadCategories();
      loadStats();
      document.getElementById('lastUpdate').textContent = new Date().toLocaleDateString('zh-CN');
    }

    init();

    // Refresh stats every 30 seconds
    setInterval(loadStats, 30000);
    // Open article modal
    async function openArticleModal(id) {
      try {
        const response = await axios.get(`/api/articles/${id}`);
        const article = response.data;
        
        const modal = document.getElementById('articleModal');
        const modalContent = document.getElementById('modalContent');
        
        const imageUrl = `https://source.unsplash.com/1200x800/?china,travel,${id}`;
        
        modalContent.innerHTML = `
          <div class="modal-header">
            <button class="modal-close" onclick="closeArticleModal()">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <div class="modal-body">
            <img src="${imageUrl}" alt="${article.title}" class="modal-image" onerror="this.src='https://images.unsplash.com/photo-1508804185872-d7badad00f7d?w=1200'">
            <div class="modal-info">
              <div class="flex items-center gap-2 mb-4">
                ${article.ai_generated ? '<span class="article-badge ai"><i class="fas fa-robot"></i> AI Generated</span>' : ''}
                <span class="article-badge">${article.language === 'en' ? '🇬🇧 English' : '🇨🇳 中文'}</span>
                <span class="article-badge">${article.category || 'News'}</span>
              </div>
              <h2 class="modal-title">${article.title}</h2>
              <div class="modal-meta">
                <span><i class="far fa-calendar"></i> ${new Date(article.created_at).toLocaleDateString('zh-CN')}</span>
                <span><i class="far fa-user"></i> ${article.source || 'Platform'}</span>
              </div>
              <div class="modal-content-text">${article.content.replace(/\n/g, '<br>')}</div>
              <div class="modal-actions">
                <button class="action-btn" onclick="shareArticle('${article.title}')">
                  <i class="fas fa-share-alt"></i> 分享
                </button>
                <button class="action-btn" onclick="copyLink(${article.id})">
                  <i class="fas fa-link"></i> 复制链接
                </button>
              </div>
            </div>
          </div>
        `;
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden';
      } catch (err) {
        console.error('Error loading article:', err);
        alert('加载文章失败');
      }
    }

    // Close modal
    function closeArticleModal() {
      const modal = document.getElementById('articleModal');
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Share article
    function shareArticle(title) {
      if (navigator.share) {
        navigator.share({
          title: title,
          url: window.location.href
        });
      } else {
        alert('分享功能需要在移动设备上使用');
      }
    }

    // Copy link
    function copyLink(id) {
      const url = `${window.location.origin}/article/${id}`;
      navigator.clipboard.writeText(url).then(() => {
        alert('链接已复制到剪贴板');
      });
    }

    // Close modal on outside click
    document.getElementById('articleModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeArticleModal();
      }
    });

    // Close modal on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeArticleModal();
      }
    });
  </script>
</body>
</html>
